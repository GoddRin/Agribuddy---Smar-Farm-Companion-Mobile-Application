name: smart_farm_companion
description: "AgriBuddy — Your Smart Filipino Farm Assistant."
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  flutter_dotenv: ^5.1.0
  just_audio: ^0.9.43
  audio_session: ^0.1.23
  flutter_tts: ^4.0.2
  speech_to_text: ^7.3.0

  # State Management
  flutter_riverpod: ^2.5.1
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  google_sign_in: ^6.2.1

  # Navigation
  go_router: ^14.0.0

  # Local Storage
  hive_flutter: ^1.1.0

  # Networking (Gemini AI)
  http: ^1.2.0

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.3

  # Charts (Expenses / Reports)
  fl_chart: ^0.68.0

  # Image
  image_picker: ^1.1.2
  connectivity_plus: ^7.1.0
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/music/
    - assets/audio/sfx/
    - .env
